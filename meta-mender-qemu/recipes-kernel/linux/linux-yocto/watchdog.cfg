# Enable a hardware watchdog in the qemux86-64 test image.
#
# systemd is configured with RebootWatchdogSec=60, i.e. it arms a hardware
# watchdog just before the final reset so that a hung reboot self-recovers.
# The qemux86-64 kernel previously built no watchdog driver at all, so there
# was no /dev/watchdog to arm and a stalled "reboot: machine restart" under
# KVM would hang the guest indefinitely (integration tests then fail with
# "Device never rebooted"). Build in the Intel 6300ESB watchdog, which the
# mender-qemu run script attaches via -device i6300esb.
CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_SYSFS=y
CONFIG_I6300ESB_WDT=y
